specVersion: 1.3.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: TestProxy
    network: celo
    source:
      address: "0x5E12835Dd11A7D35E0D5E49E2c66b9235C148243"
      abi: TestProxy
      startBlock: 59616653
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Upgraded
      abis:
        - name: TestProxy
          file: ./abis/TestProxy.json
      eventHandlers:
        - event: Upgraded(indexed address)
          handler: handleUpgraded
      file: ./src/test-proxy.ts
