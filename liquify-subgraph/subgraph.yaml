specVersion: 1.3.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: AttestifyVault
    network: celo
    source:
      address: "0x97fc253B38E913d4aB8d30Df7b28910F065c8F1c"
      abi: AttestifyVault
      startBlock: 59616648
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Deposited
        - Initialized
        - LimitsUpdated
        - OwnershipTransferred
        - Paused
        - Rebalanced
        - StrategyUpdated
        - Unpaused
        - Upgraded
        - Withdrawn
      abis:
        - name: AttestifyVault
          file: ./abis/AttestifyVault.json
      eventHandlers:
        - event: Deposited(indexed address,uint256,uint256)
          handler: handleDeposited
        - event: Initialized(uint64)
          handler: handleInitialized
        - event: LimitsUpdated(uint256,uint256)
          handler: handleLimitsUpdated
        - event: OwnershipTransferred(indexed address,indexed address)
          handler: handleOwnershipTransferred
        - event: Paused(address)
          handler: handlePaused
        - event: Rebalanced(uint256,uint256,uint256)
          handler: handleRebalanced
        - event: StrategyUpdated(indexed address,indexed address)
          handler: handleStrategyUpdated
        - event: Unpaused(address)
          handler: handleUnpaused
        - event: Upgraded(indexed address)
          handler: handleUpgraded
        - event: Withdrawn(indexed address,uint256,uint256)
          handler: handleWithdrawn
      file: ./src/attestify-vault.ts
